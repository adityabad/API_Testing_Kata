name: API Testing CI

on:
  # Standalone triggers
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

  # Scheduled trigger: runs every day at 6:00 AM UTC
  schedule:
    - cron: '0 6 * * *'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        run: mvn -B clean test

      - name: Upload Cucumber HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-reports.html

      - name: Upload Cucumber JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-json
          path: target/cucumber.json

name: API Testing CI

on:
  # Standalone triggers
  push:
    branches:
      - main
      - kata-feature-booking
  pull_request:
    branches:
      - main
      - kata-feature-booking

  # Scheduled trigger: runs every day at 6:00 AM UTC
  schedule:
    - cron: '0 6 * * *'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  build-and-test:
    name: Build and Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        env:
          BOOKING_USERNAME: ${{ secrets.BOOKING_USERNAME }}
          BOOKING_PASSWORD: ${{ secrets.BOOKING_PASSWORD }}
        run: mvn -B clean test

      - name: Generate Cucumber HTML report
        if: always()
        run: |
          mkdir -p target/cucumber-report
          cp target/cucumber-reports.html target/cucumber-report/index.html

      - name: Upload Cucumber HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report
          path: target/cucumber-report/

      - name: Publish test summary to GitHub Actions
        if: always()
        run: |
          python3 << 'EOF'
          import json
          import os

          report_path = 'target/cucumber.json'
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY')

          if not os.path.exists(report_path):
              with open(summary_path, 'a') as f:
                  f.write('## API Test Results\n\nCucumber JSON report not found.\n')
              exit(0)

          with open(report_path, 'r', encoding='utf-8') as f:
              data = json.load(f)

          total = passed = failed = skipped = 0
          failed_scenarios = []

          for feature in data:
              feature_name = feature.get('name', 'Unknown Feature')
              for element in feature.get('elements', []):
                  if element.get('type') == 'background':
                      continue
                  scenario_name = element.get('name', 'Unknown Scenario')
                  steps = element.get('steps', [])
                  statuses = [s.get('result', {}).get('status') for s in steps if 'result' in s]

                  total += 1
                  if 'failed' in statuses:
                      failed += 1
                      failed_scenarios.append(f"{feature_name} > {scenario_name}")
                  elif 'skipped' in statuses:
                      skipped += 1
                  elif statuses and all(s == 'passed' for s in statuses):
                      passed += 1

          with open(summary_path, 'a') as f:
              f.write('## API Test Results\n\n')
              f.write(f"- **Total scenarios:** {total}\n")
              f.write(f"- **Passed:** {passed} :white_check_mark:\n")
              f.write(f"- **Failed:** {failed} :x:\n")
              f.write(f"- **Skipped:** {skipped} :warning:\n\n")

              if failed > 0:
                  f.write("### Failed scenarios\n\n")
                  for scenario in failed_scenarios:
                      f.write(f"- {scenario}\n")
                  f.write("\n")

              f.write("Download the full Cucumber HTML report from the **Artifacts** section above.\n")
          EOF

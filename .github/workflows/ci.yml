name: API Testing CI

on:
  # Standalone triggers
  push:
    branches:
      - main
      - kata-feature-booking
  pull_request:
    branches:
      - main
      - kata-feature-booking

  # Scheduled trigger: runs every day at 6:00 AM UTC
  schedule:
    - cron: '0 6 * * *'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  build-and-test:
    name: Build and Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        env:
          BOOKING_USERNAME: ${{ secrets.BOOKING_USERNAME }}
          BOOKING_PASSWORD: ${{ secrets.BOOKING_PASSWORD }}
        run: mvn -B clean test

      - name: Publish test results to GitHub Actions
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Maven Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false
